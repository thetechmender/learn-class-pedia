<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative">
    <!-- Close Button -->
    <button (click)="onClose()"
      class="absolute top-4 right-4 w-10 h-10 rounded-full bg-primary hover:bg-blue-700 flex items-center justify-center transition-colors z-10">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Content -->
    <div class="p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-2xl text-gray-900 mb-1 font-medium">Share Your Accomplishment</h2>
        <p class="text-gray-600">Showcase your achievement whit others.</p>
      </div>

      <!-- LinkedIn Section -->
      <div class="mb-6 pb-6 border-b border-gray-200">
        <div class="flex items-start justify-between gap-4">
          <img src="assets/icons/linkedin-icon.png" alt="LinkedIn" class="h-12 w-12">
          <div class="flex-1 flex justify-end items-center">
            <div>
              <h3 class="text-lg font-medium text-gray-900 mb-1">Add to Linkedin Profile</h3>
              <p class="text-sm text-gray-600 mb-4">Share your accomplishment to your Linkedin profile and boost your
                credibility</p>
            </div>
            <div>
              <button (click)="onShareLinkedin()"
                class="px-6 py-2.5 bg-primary text-white font-semibold rounded-full hover:bg-blue-700 transition-all">
                Share
              </button>
            </div>
          </div>

        </div>
      </div>

      <!-- Public Certificate Link Section -->
      <div class="mb-6 pb-6 border-b border-gray-200">
        <div class="flex items-start gap-4">
          <!-- <div class="w-12 h-12 bg-blue-100 rounded flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div> -->
          <img src="assets/icons/public-certificate.svg" alt="Certificate" class="h-10 w-10">
          <div class="flex-1">
            <h3 class="text-lg font-medium text-gray-900 mb-3">Public Certificate Link</h3>
            <div class="flex gap-2">
              <input type="text" [value]="publicCertificateLink" readonly
                class="flex-1 px-4 py-2.5 bg-gray-100 border border-gray-300 rounded-full text-sm text-gray-700 focus:outline-none" />
              <button (click)="onCopyPublicLink()"
                class="px-6 py-2.5 bg-primary text-white font-semibold rounded-full hover:bg-blue-700 transition-all whitespace-nowrap">
                @if (showPublicLinkCopied()) {
                  Copied!
                } @else {
                  Copy link
                }
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Embed Seal Section -->
      <div class="mb-4">
        <div class="flex items-start gap-4">
          <!-- <div class="w-12 h-12 bg-blue-100 rounded flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
            </svg>
          </div> -->
          <img src="assets/icons/seal-inverse.svg" alt="Embed Seal" class="h-10 w-10">
          <div class="flex-1">
            <h3 class="text-lg font-medium text-gray-900 mb-3">Embed Seal</h3>
            <div class="flex gap-2 mb-3">
              <input type="text" [value]="embedSealCode()" readonly
                class="flex-1 px-4 py-2.5 bg-gray-100 border border-gray-300 rounded-full text-sm text-gray-700 focus:outline-none" />
              <button (click)="onCopyEmbedCode()"
                class="px-6 py-2.5 bg-primary text-white font-semibold rounded-full hover:bg-blue-700 transition-all whitespace-nowrap">
                @if (showEmbedCodeCopied()) {
                  Copied!
                } @else {
                  Copy link
                }
              </button>
            </div>
            <p class="text-sm text-gray-600">Embed a verified seal on your website or portfolio.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
