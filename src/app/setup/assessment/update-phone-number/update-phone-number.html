<div class="fixed inset-0 z-[9999] bg-black/50 flex items-center justify-center p-4" (click)="onClose()">
  <div class="bg-white rounded-lg max-w-2xl w-full p-8" (click)="$event.stopPropagation()">
    <div class="popup-email-box">
      <!-- Close Button -->
      <button 
        type="button" 
        (click)="onClose()" 
        class="absolute top-0 right-2 text-gray-400 hover:text-gray-600 text-2xl font-light"
      >
        ×
      </button>

      <div class="popup-email-box-head">
        <div class="ico-pop">
          <div class="w-20 h-20 mx-auto mb-4 bg-blue-50 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
          </div>
        </div>
        <h5 class="text-2xl font-semibold text-center mb-2">Add Phone Number</h5>
        <p class="text-gray-500 text-center mb-6">Please enter your phone number in order to move ahead with sharing your course or downloading your certificate</p>
      </div>
      
      <form [formGroup]="phoneForm" (ngSubmit)="onSubmit()">
        <div class="conformbox">
          <label for="phoneNumber" class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
          <div class="mb-4">
            <input 
              #phoneInput
              maxlength="10"
              minlength="10"
              type="tel" 
              id="phoneNumber"
              formControlName="phoneNumber" 
              class="form-control w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              placeholder="300 1234567"
            />
            @if (phoneForm.get('phoneNumber')?.invalid && phoneForm.get('phoneNumber')?.touched) {
              <div class="text-red-500 text-sm mt-1">Phone number is required</div>
            }
          </div>
        </div>

        <div class="btn-holder flex gap-3 mt-6">
          <button 
            type="submit" 
            [disabled]="isSubmitting()"
            class="btn btn-primary flex-1 px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors"
          >
            @if (isSubmitting()) {
              <div class="flex items-center justify-center gap-2">
                <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                Adding Number...
              </div>
            } @else {
              Add Number
            }
          </button>
          <button 
            type="button"
            (click)="onCancel()"
            class="btn btn-secondary flex-1 px-6 py-3 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 transition-colors"
          >
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
