<!-- Blocking overlay with blur -->
<div class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/60 cursor-default">
  <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 p-8 text-center">
    <!-- Warning Icon -->
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-5">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>

    <!-- Title -->
    <h2 class="text-xl font-bold text-gray-900 mb-3">Assessment Violation</h2>

    <!-- Warning Message -->
    <p class="text-sm text-gray-600 mb-4">{{ warningMessage }}</p>

    <!-- Remaining Warnings -->
    @if (warningCount < maxWarnings) {
    <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 mb-6">
      <p class="text-sm font-semibold text-red-700">
        Warning: <span class="text-red-900">{{ warningCount }}</span> / {{ maxWarnings }}
      </p>
      <p class="text-xs text-red-500 mt-1">Your assessment will be auto-submitted if you exceed the warning limit.</p>
    </div>
    } @else {
    <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 mb-6">
      <p class="text-sm font-semibold text-red-700">
        Warning limit reached. Your assessment is being auto-submitted.
      </p>
    </div>
    }

    <!-- Acknowledge Button -->
    <button (click)="onAcknowledge()"
      class="w-full px-6 py-3 bg-red-600 text-white font-semibold rounded-full hover:bg-red-700 transition-all">
      Acknowledge
    </button>
  </div>
</div>
