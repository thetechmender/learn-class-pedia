<div class="p-6">
  @if (activeSection) {
    <div class="space-y-3">
      @for (para of transcriptParagraphs; track $index) {
        <p class="text-gray-700 text-sm leading-relaxed">{{ para }}</p>
      }
    </div>
  } @else {
    <div class="text-center py-8">
      <p class="text-gray-500">Select a section to view transcript</p>
    </div>
  }
</div>
