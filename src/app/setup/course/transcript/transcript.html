<div class="p-6">
  <!-- <h2 class="text-lg font-semibold text-gray-800 mb-4">Transcript</h2> -->
  
  @if (activeSection) {
    <div class="space-y-4">
      @for (line of transcriptLines; track line.index) {
        <div class="flex gap-4 p-3 rounded-lg hover:bg-gray-50 transition-colors">
          <span class="text-primary font-mono text-sm font-medium min-w-[50px]">{{ line.time }}</span>
          <p class="text-gray-700 text-sm leading-relaxed flex-1">{{ line.text }}</p>
        </div>
      }
    </div>
  } @else {
    <div class="text-center py-8">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      <p class="text-gray-500">Select a section to view transcript</p>
    </div>
  }
</div>
