<div class="p-6">
  <!-- <h2 class="text-lg font-semibold text-gray-800 mb-4">Downloads</h2> -->
  
  @if (pdfFiles.length > 0) {
    <div class="space-y-3">
      @for (pdf of pdfFiles; track pdf.index) {
        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-200 hover:border-primary hover:bg-blue-50 transition-all">
          <div class="flex items-center gap-3">
            <!-- PDF Icon -->
            <div class="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
              </svg>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-800">{{ pdf.name }}</p>
              <p class="text-xs text-gray-500">PDF Document</p>
            </div>
          </div>
          <!-- Download Button -->
          <button (click)="downloadPdf(pdf.path, pdf.name)" 
            class="flex items-center gap-2 px-4 py-2 btn-gradient-primary text-white text-sm font-medium rounded-lg hover:opacity-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Download
          </button>
        </div>
      }
    </div>
  } @else {
    <div class="text-center py-8">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
      </svg>
      <p class="text-gray-500">No PDF files available for this section</p>
    </div>
  }
</div>
