<div class="p-2 pb-20">
    @if (this.overView()?.keyPoints?.length > 0) {
    <div class="mb-8">
        <h3 class="text-lg font-bold text-gray-900 mb-4">Key Points</h3>
        <div class="space-y-4">
            @for(point of this.overView()?.keyPoints || []; track point; let i = $index) {
            <div class="flex items-start gap-3">
                <!-- <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary flex-shrink-0 mt-0.5" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg> -->
                <i class="ic-53 text-primary mt-1"></i>
                <p class="text-sm text-gray-600 leading-relaxed">{{point}}</p>
            </div>
            }
        </div>
    </div>
    }
    @else {
    <div class="text-center py-8">
        <p class="text-gray-500">No key points available</p>
    </div>
    }
</div>
