<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" (click)="closeModal()">
  <!-- Modal Content -->
  <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[80vh] overflow-hidden shadow-xl"
    (click)="$event.stopPropagation()">
    <!-- Modal Header -->
    <div class="flex items-center justify-between p-6 border-b border-gray-200">
      <h2 class="text-xl font-bold text-gray-900">All Reviews ({{ reviews.length }})</h2>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Modal Body - Scrollable -->
    <div class="p-6 overflow-y-auto max-h-[60vh]">
      @if (reviews.length === 0) {
      <p class="text-gray-500 text-center py-8">No reviews yet.</p>
      } @else {
      @for (review of reviews; track review; let i = $index) {
      <div class="bg-gray-50 rounded-xl p-4 mb-4">
        <div class="flex items-start gap-4">
          <img src="https://randomuser.me/api/portraits/men/{{ (i % 50) + 1 }}.jpg" [alt]="review?.customerName"
            class="w-12 h-12 rounded-full object-cover border-2 border-gray-200" />

          <div class="flex-1">
            <div class="flex items-center justify-between mb-2">
              <h4 class="font-semibold text-gray-900">{{ review?.customerName || 'Anonymous' }}</h4>
              <!-- <div class="flex items-center gap-1">
                @for (star of [1,2,3,4,5]; track star) {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4"
                  [class.text-primary]="star <= (review?.rating || 5)"
                  [class.text-gray-300]="star > (review?.rating || 5)" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                </svg>
                }
              </div> -->
              <div class="flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-primary" fill="currentColor"
                  viewBox="0 0 24 24">
                  <path
                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                </svg>
                <span class="text-sm font-medium text-gray-700">{{review?.rating}}</span>
              </div>
            </div>
            <p class="text-sm text-gray-600 leading-relaxed">"{{ review?.reviewText }}"</p>
          </div>
        </div>
      </div>
      }
      }
    </div>
  </div>
</div>
