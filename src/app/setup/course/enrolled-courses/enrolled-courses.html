
    @if(enrolledCourses()?.length > 0) {
    <div class="w-[28rem] flex-shrink-0">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <h3 class="text-lg font-bold text-gray-900 mb-6">Other Enrolled Courses</h3>

        <!-- Related Course 1 -->
        @for(item of enrolledCourses(); track item.id; let i = $index){
        <a [href]="'https://classpedia.ai/' + item.courseSlug" target="_blank" rel="noopener noreferrer">
          <div class="flex gap-4 mb-5 cursor-pointer hover:opacity-80 transition-opacity">
            <img [src]="item?.courseThumbnail" [alt]="item?.courseName"
              class="w-24 h-16 rounded-lg flex-shrink-0 object-cover bg-gray-200">
            <div class="flex-1">
              <p class="text-xs text-gray-500 mb-1">{{item.courseType}}</p>
              <h4 class="text-sm font-medium text-gray-800 leading-snug line-clamp-2">{{item?.courseName}}</h4>
              <div class="w-full h-2 bg-thirdly rounded-full overflow-hidden mt-2">
                <div class="h-full bg-primary rounded-full transition-all duration-300"
                  [style.width.%]="item?.completionPercentage || 0"></div>
              </div>
              <!-- <span class="text-sm text-gray-500">{{ (item?.completionPercentage || 0) | number:'1.0-1' }}%</span> -->
            </div>
          </div>
        </a>
        }
      </div>
    </div>
    }
