<header class="bg-white shadow-lg sticky top-0 z-50 border-b border-gray-100">

    <div class="flex items-center gap-2">
      <img src="logo-removebg-preview.png" alt="Classpedia" class="h-8 w-auto">
    </div>
    
    <div class="flex items-center gap-2 sm:gap-4">
      <div class="hidden sm:flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        <span class="hidden md:inline">100% Complete</span>
        <span class="text-xs text-gray-400 hidden lg:inline">8 of 8 lectures</span>
      </div>
      
      <button class="btn-gradient-primary text-white px-3 sm:px-5 py-2 rounded-lg text-sm font-semibold transition-all duration-300 hover:opacity-90 flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        <span class="hidden sm:inline">Complete All</span>
      </button>

        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />

        <span class="hidden sm:inline">Chat</span>

      <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-primary text-white flex items-center justify-center font-semibold text-sm cursor-pointer hover:bg-primary-600 transition-colors">
        DA
      </div>
    </div>
  </div>
