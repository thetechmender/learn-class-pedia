
<app-loading></app-loading>

@if (!network.isOnline()) {
  <div class="fixed top-0 left-0 right-0 z-[100] bg-red-600 text-white text-center py-2 text-sm font-medium">
    No Internet Connection
  </div>
}

<div class="flex flex-col h-screen">
  @if (router.url !== '/login') {
    <app-header></app-header>
  }
  <main class="flex-1 overflow-y-auto" [class.screen-blur]="isPaused">
    <router-outlet />
  </main>
  @if (router.url !== '/login') {
    <app-mobile-nav></app-mobile-nav>
  }
</div>

<style>
  .screen-blur {
    filter: blur(20px);
    pointer-events: none;
  }
</style>
